name: NUML Class Reminder

on:
  schedule:
    # Runs every 5 mins, Mon-Fri, 3AM-9AM UTC (= 8AM-2PM PKT)
    - cron: "*/5 3-9 * * 1-5"
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reminder
        env:
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python reminder.py

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: reminder-log-${{ github.run_id }}
          path: reminder.log
          retention-days: 3
        if: always()
